# Theme configuration
# Format: tool.variant = theme-name
# Used by ~/bin/switch-theme and read by delta-pager, bat, etc.
#
# Supported theme packs: rose-pine, gruvbox, catppuccin
# Change with: switch-theme dark <pack>   (e.g. switch-theme dark gruvbox)
#              switch-theme light <pack>
#              switch-theme both <pack>

[dark]
ghostty = Gruvbox Dark Hard
nvim_colorscheme = gruvbox
nvim_background = dark
tmux = gruvbox-dark
bat = gruvbox-dark
delta = gruvbox-dark
lualine = gruvbox
pi = rose-pine-dark

[light]
ghostty = Rose Pine Dawn Warm
nvim_colorscheme = rose-pine-dawn
nvim_background = light
tmux = rose-pine-light
bat = rose-pine-dawn
delta = rose-pine-dawn
lualine = rose-pine
pi = kanagawa-light
