## COLORSCHEME: kanagawa dragon
set-option -g status "on"

# default statusbar color
set-option -g status-style bg=#181616,fg=#c5c9c5

# default window title colors
set-window-option -g window-status-style bg=#282727,fg=#c5c9c5

# default window with an activity alert
set-window-option -g window-status-activity-style bg=#181616,fg=#c5c9c5

# active window title colors
set-window-option -g window-status-current-style bg=#c4b28a,fg=#181616

# pane border
set-option -g pane-active-border-style fg=#393836
set-option -g pane-border-style fg=#282727

# message infos
set-option -g message-style bg=#282727,fg=#c5c9c5

# writing commands inactive
set-option -g message-command-style bg=#282727,fg=#c5c9c5

# pane number display
set-option -g display-panes-colour #181616
set-option -g display-panes-active-colour #c4b28a

# clock
set-window-option -g clock-mode-colour #8ea4a2

# bell
set-window-option -g window-status-bell-style bg=#c4746e,fg=#c5c9c5

## Theme settings
set-option -g status-justify "left"
set-option -g status-left-style none
set-option -g status-left-length "80"
set-option -g status-right-style none
set-option -g status-right-length "80"
set-window-option -g window-status-separator ""

set-option -g status-left "#[bg=#c4b28a,fg=#181616] #S #[bg=#181616,fg=#c4b28a,nobold,noitalics,nounderscore]"
set-option -g status-right "#[bg=#181616,fg=#282727 nobold, nounderscore, noitalics]#[bg=#282727,fg=#c5c9c5] %Y-%m-%d #[bg=#282727,fg=#181616] #[bg=#282727,fg=#c5c9c5]%H:%M #[bg=#282727,fg=#c4b28a,nobold,noitalics,nounderscore]#[bg=#c4b28a,fg=#181616] #h "

set-window-option -g window-status-current-format "#[bg=#c4b28a,fg=#181616,nobold,noitalics,nounderscore]#[bg=#c4b28a,fg=#181616] #I #[bg=#c4b28a,fg=#181616,bold] #W#{?window_zoomed_flag, ◎,} #[bg=#181616,fg=#c4b28a,nobold,noitalics,nounderscore]"
set-window-option -g window-status-format "#[bg=#282727,fg=#181616,noitalics]#[bg=#282727,fg=#c5c9c5] #I #[bg=#282727,fg=#181616]#[bg=#282727,fg=#c5c9c5] #W #[bg=#181616,fg=#282727,noitalics]"

# vim: set ft=tmux tw=0 nowrap:
